<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wansah | ونسة</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
      padding: 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
      font-size: 18px;
    }

    .timer {
      margin-top: 20px;
      font-size: 24px;
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
    }

    button {
      margin-top: 20px;
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #2563eb;
      color: white;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1 id="title">ونسة</h1>
  <p id="subtitle">الإطلاق قريباً 🚀</p>

  <div class="timer" id="countdown">...</div>

  <p id="launchText">الإطلاق الساعة 10:00 صباحًا - 10 ذو الحجة 1447 هـ</p>

  <button onclick="toggleLang()">EN / AR</button>

</div>

<script>
  const launchDate = new Date("2026-05-27T10:00:00+03:00");

  let lang = "ar";

  const texts = {
    ar: {
      title: "ونسة",
      subtitle: "الإطلاق قريباً 🚀",
      launch: "الإطلاق الساعة 10:00 صباحًا - 10 ذو الحجة 1447 هـ"
    },
    en: {
      title: "Wansah",
      subtitle: "Launching Soon 🚀",
      launch: "Launch at 10:00 AM - 10 Dhu al-Hijjah 1447 AH"
    }
  };

  function updateCountdown() {
    const now = new Date();
    const diff = launchDate - now;

    if (diff <= 0) {
      document.getElementById("countdown").innerHTML =
        lang === "ar" ? "تم الإطلاق 🎉" : "Launched 🎉";
      return;
    }

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const m = Math.floor((diff / (1000 * 60)) % 60);
    const s = Math.floor((diff / 1000) % 60);

    document.getElementById("countdown").innerHTML =
      `${d}d ${h}h ${m}m ${s}s`;
  }

  function toggleLang() {
    lang = (lang === "ar") ? "en" : "ar";

    document.getElementById("title").innerText = texts[lang].title;
    document.getElementById("subtitle").innerText = texts[lang].subtitle;
    document.getElementById("launchText").innerText = texts[lang].launch;

    document.documentElement.lang = lang;
    document.documentElement.dir = (lang === "ar") ? "rtl" : "ltr";
  }

  setInterval(updateCountdown, 1000);
  updateCountdown();
</script>

</body>
</html>
